name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Book
        working-directory: book
        run: |
          npm ci
          npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Game
        working-directory: game
        run: |
          npm ci
          npm run test
          npm run build

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r book/dist/* _site/
          mkdir -p _site/game
          cp -r game/dist/* _site/game/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
